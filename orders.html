<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>My Orders — OZYDE</title>
    <style>
         :root {
            --bg: #fff;
            --nav-bg: #0b0b0b;
            --muted: #9a9a9a;
            --accent: #111;
            --max-width: 1200px;
        }
        
        * {
            box-sizing: border-box
        }
        
        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            color: #111;
            background: var(--bg)
        }
        
        .nav-wrap {
            background: var(--nav-bg);
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 120;
            box-shadow: 0 6px 20px rgba(2, 2, 2, 0.12)
        }
        
        .nav {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 18px;
            justify-content: space-between
        }
        
        .logo {
            display: flex;
            gap: 12px;
            align-items: center;
            font-weight: 800;
            letter-spacing: 1px;
            font-size: 20px
        }
        
        .logo-badge {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, #fff2, #fff6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #111;
            font-weight: 900;
            font-size: 16px
        }
        
        .search {
            flex: 1;
            max-width: 640px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 0 12px
        }
        
        .search input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 999px 0 0 999px;
            border: 0;
            outline: 0;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff
        }
        
        .search button {
            padding: 10px 12px;
            border-radius: 0 999px 999px 0;
            border: 0;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center
        }
        
        .icons {
            display: flex;
            gap: 14px;
            align-items: center
        }
        
        .icon-only {
            display: inline-flex;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 0;
            color: #fff;
            cursor: pointer
        }
        
        .profile-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #222, #111);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700
        }
        
        .profile-area {
            position: relative
        }
        
        .profile-btn {
            display: flex;
            gap: 10px;
            align-items: center;
            background: transparent;
            border: 0;
            color: #fff;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 8px
        }
        
        .dropdown {
            position: absolute;
            right: 0;
            top: calc(100% + 10px);
            background: #111;
            border-radius: 10px;
            padding: 8px 6px;
            min-width: 180px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: none
        }
        
        .dropdown a {
            display: block;
            color: #fff;
            padding: 10px 12px;
            text-decoration: none;
            font-size: 14px;
            border-radius: 8px
        }
        
        .dropdown a:hover {
            background: #1a1a1a
        }
        
        .mobile-toggle {
            display: none;
            background: transparent;
            border: 0;
            color: #fff
        }
        
        .mobile-menu {
            display: none;
            padding: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.03)
        }
        
        @media (max-width:880px) {
            .search {
                display: none
            }
            .mobile-toggle {
                display: inline-flex
            }
        }
        /* page styles */
        
        main {
            max-width: var(--max-width);
            margin: 28px auto;
            padding: 0 18px 60px
        }
        
        .topline {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px
        }
        
        .back-btn {
            background: #fff;
            border: 0;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700
        }
        
        h1 {
            margin: 0
        }
        
        .muted {
            color: var(--muted);
            font-size: 14px
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap
        }
        
        .tab {
            padding: 8px 12px;
            border-radius: 999px;
            background: #f4f4f6;
            border: 1px solid #eee;
            cursor: pointer;
            font-weight: 700
        }
        
        .tab[aria-selected="true"] {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent)
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-top: 18px
        }
        
        @media (max-width:880px) {
            .grid {
                grid-template-columns: 1fr
            }
        }
        
        .order-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #eee;
            box-shadow: 0 6px 18px rgba(8, 8, 12, 0.03)
        }
        
        .order-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px
        }
        
        .order-meta {
            font-size: 13px;
            color: var(--muted)
        }
        
        .order-items {
            margin-top: 12px;
            border-top: 1px dashed #f0f0f0;
            padding-top: 12px
        }
        
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px
        }
        
        .item-label {
            font-weight: 600
        }
        
        .status-pill {
            padding: 6px 10px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 13px
        }
        
        .status-pending {
            background: #fff7dd;
            color: #a67b00;
            border: 1px solid #f2e1b6
        }
        
        .status-complete {
            background: #e9ffef;
            color: #0b7a3a;
            border: 1px solid #d9f3db
        }
        
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 12px
        }
        
        .btn {
            padding: 10px 12px;
            border-radius: 8px;
            border: 0;
            cursor: pointer;
            font-weight: 700
        }
        
        .btn.ghost {
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.06)
        }
        
        .btn.primary {
            background: var(--accent);
            color: #fff
        }
        
        .empty {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            color: var(--muted)
        }
        
        .small {
            font-size: 13px;
            color: var(--muted)
        }
    </style>
</head>

<body>
    <!-- NAVBAR (your original markup; enhanced with link IDs) -->
    <header class="nav-wrap" role="banner">
        <div class="nav" role="navigation" aria-label="Main navigation">
            <div style="display:flex;align-items:center;gap:12px">
                <div class="logo" id="brandLink" style="cursor:pointer">
                    <div class="logo-badge" aria-hidden="true">OZ</div>
                    <div>OZYDE</div>
                </div>
            </div>

            <div class="search" role="search" aria-label="Site search">
                <input id="searchInput" type="search" placeholder="Search dresses, styles, collection..." aria-label="Search">
                <button id="searchBtn" aria-label="Search">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none"><path d="M21 21l-4.35-4.35" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="11" cy="11" r="6" stroke="#111" stroke-width="2"/></svg>
        </button>
            </div>

            <div class="icons" role="group" aria-label="User actions">
                <button class="icon-only" title="Wishlist" aria-label="Wishlist" id="topWishlistBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20.8 7.2a5 5 0 0 0-7.07 0L12 8.94l-1.73-1.72a5 5 0 1 0-7.07 7.07L12 21.5l8.8-8.8a5 5 0 0 0 0-7.5z" stroke="white" stroke-width="1.2" fill="none"/></svg>
        </button>

                <button class="icon-only" title="Cart" aria-label="Cart" id="topCartBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 3h2l1 7h13" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="10" cy="20" r="1.5" fill="white"/><circle cx="18" cy="20" r="1.5" fill="white"/></svg>
        </button>

                <div class="profile-area" id="profileArea">
                    <button class="profile-btn" id="profileBtn" aria-haspopup="true" aria-expanded="false" aria-label="Open account menu">
            <div class="profile-avatar" aria-hidden="true">A</div>
            <div style="text-align:left">
              <div style="font-weight:700; font-size:14px">A. Nomvula</div>
              <div style="font-size:12px; color:#bdbdbd;">Member</div>
            </div>
          </button>

                    <div class="dropdown" id="profileDropdown" role="menu" aria-hidden="true">
                        <a href="profile.html" role="menuitem">My Account</a>
                        <a href="orders.html" role="menuitem">My Orders</a>
                        <a href="wishlist.html" role="menuitem">Wishlist</a>
                        <a href="#" role="menuitem" id="signOutLink">Sign out</a>
                    </div>
                </div>

                <button class="mobile-toggle" id="mobileToggle" aria-expanded="false" aria-label="Open menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 7h18M3 12h18M3 17h18" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
            </div>
        </div>

        <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
            <div style="margin-bottom:10px">
                <input id="mobileSearch" type="search" placeholder="Search dresses..." style="width:100%; padding:10px 12px; border-radius:8px; border:0; background:rgba(255,255,255,0.04); color:#fff">
            </div>
            <div style="display:flex;gap:10px">
                <button class="icon-only" aria-label="Wishlist (mobile)" id="mWishlist"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20.8 7.2a5 5 0 0 0-7.07 0L12 8.94l-1.73-1.72a5 5 0 1 0-7.07 7.07L12 21.5l8.8-8.8a5 5 0 0 0 0-7.5z" stroke="white" stroke-width="1.2" fill="none"/></svg></button>
                <button class="icon-only" aria-label="Cart (mobile)" id="mCart"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 3h2l1 7h13" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="10" cy="20" r="1.5" fill="white"/><circle cx="18" cy="20" r="1.5" fill="white"/></svg></button>
                <button class="profile-btn" style="background:transparent;border:0;color:#fff" id="mAccountBtn">Account</button>
            </div>
        </div>
    </header>

    <main>
        <div class="topline">
            <button id="backBtn" class="back-btn" aria-label="Go back">← Back</button>
            <div>
                <h1>My Orders</h1>
                <div class="muted">A history of your rentals and purchases. Click an order to view details or request support.</div>
            </div>
        </div>

        <div class="tabs" role="tablist" aria-label="Order filters">
            <button class="tab" role="tab" aria-selected="true" data-filter="all" id="tabAll">All</button>
            <button class="tab" role="tab" aria-selected="false" data-filter="pending" id="tabPending">Pending</button>
            <button class="tab" role="tab" aria-selected="false" data-filter="complete" id="tabComplete">Complete</button>
        </div>

        <div id="ordersWrap" class="grid" aria-live="polite" style="margin-top:18px"></div>

        <div id="emptyState" class="empty" style="display:none;margin-top:18px">
            <div style="font-size:18px;font-weight:700;margin-bottom:8px">No orders found</div>
            <div class="small">Browse the collection and reserve an outfit — your orders will appear here.</div>
            <div style="margin-top:12px"><a class="btn primary" href="index.html">Browse Dresses</a></div>
        </div>
    </main>

    <script>
        // NAV interactions (mobile toggle, profile dropdown, search)
        (function() {
            const mt = document.getElementById('mobileToggle');
            const mm = document.getElementById('mobileMenu');
            mt && mt.addEventListener('click', () => {
                const open = mm.style.display === 'block';
                mm.style.display = open ? 'none' : 'block';
                mt.setAttribute('aria-expanded', String(!open));
                mm.setAttribute('aria-hidden', String(open));
            });

            const profileBtn = document.getElementById('profileBtn');
            const dropdown = document.getElementById('profileDropdown');
            const profileArea = document.getElementById('profileArea');

            profileBtn && profileBtn.addEventListener('click', () => {
                const visible = dropdown.style.display === 'block';
                dropdown.style.display = visible ? 'none' : 'block';
                dropdown.setAttribute('aria-hidden', String(visible));
                profileBtn.setAttribute('aria-expanded', String(!visible));
            });

            document.addEventListener('click', (e) => {
                if (!profileArea.contains(e.target)) {
                    dropdown.style.display = 'none';
                    dropdown.setAttribute('aria-hidden', 'true');
                    profileBtn && profileBtn.setAttribute('aria-expanded', 'false');
                }
            });

            document.getElementById('searchBtn').addEventListener('click', () => {
                const q = document.getElementById('searchInput').value.trim();
                if (!q) {
                    alert('Type something to search (demo)');
                    return;
                }
                // implement real search redirect in integration: /search?q=...
                window.location.href = `search.html?q=${encodeURIComponent(q)}`;
            });

            // Top icons navigation
            document.getElementById('topWishlistBtn').addEventListener('click', () => window.location.href = 'wishlist.html');
            document.getElementById('topCartBtn').addEventListener('click', () => window.location.href = 'cart.html');
            document.getElementById('mWishlist').addEventListener('click', () => window.location.href = 'wishlist.html');
            document.getElementById('mCart').addEventListener('click', () => window.location.href = 'cart.html');
            document.getElementById('brandLink').addEventListener('click', () => window.location.href = 'index.html');

            // profile menu links
            document.getElementById('signOutLink').addEventListener('click', (e) => {
                e.preventDefault();
                // In real app: call sign-out endpoint. Here: redirect to home demo.
                if (!confirm('Sign out?')) return;
                window.location.href = 'index.html';
            });

            document.getElementById('mAccountBtn').addEventListener('click', () => window.location.href = 'profile.html');
        })();
    </script>

    <script>
        // Orders page logic + accessible tabs
        (function() {
            const ordersWrap = document.getElementById('ordersWrap');
            const emptyState = document.getElementById('emptyState');
            const tabs = Array.from(document.querySelectorAll('.tab'));

            const ordersDemo = [{
                id: 'OZY-20250917-1',
                createdAt: '2025-09-17T10:30:00Z',
                status: 'pending',
                total: 5738.48,
                items: [{
                    id: 'itm1',
                    title: 'Evening Gown Rental',
                    days: 3,
                    price: 1119.99
                }, {
                    id: 'itm2',
                    title: 'Cocktail Dress',
                    days: 2,
                    price: 3869.99
                }]
            }, {
                id: 'OZY-20250801-5',
                createdAt: '2025-08-01T14:12:00Z',
                status: 'complete',
                total: 2999.00,
                items: [{
                    id: 'itm3',
                    title: 'Matric Dress',
                    days: 4,
                    price: 2999.00
                }]
            }];

            function formatDateISO(iso) {
                try {
                    const d = new Date(iso);
                    return d.toLocaleString(undefined, {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                } catch (e) {
                    return iso
                }
            }

            function formatMoney(n) {
                return 'R' + Number(n).toLocaleString(undefined, {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                })
            }

            function statusClass(status) {
                if (status === 'pending') return 'status-pending';
                if (status === 'complete' || status === 'paid') return 'status-complete';
                return 'status-pending';
            }

            function renderOrders(filter = 'all') {
                const list = ordersDemo.filter(o => (filter === 'all') ? true : (o.status === filter));
                ordersWrap.innerHTML = '';
                if (!list.length) {
                    ordersWrap.style.display = 'none';
                    emptyState.style.display = '';
                    emptyState.querySelector('.small') && (emptyState.querySelector('.small').textContent = filter === 'all' ? 'No orders yet.' : `No ${filter} orders found.`);
                    return;
                }
                ordersWrap.style.display = '';
                emptyState.style.display = 'none';

                list.forEach(o => {
                    const el = document.createElement('article');
                    el.className = 'order-card';
                    el.innerHTML = `
            <div class="order-head">
              <div>
                <div style="font-weight:800">${escapeHtml(o.id)}</div>
                <div class="order-meta">${formatDateISO(o.createdAt)}</div>
              </div>
              <div style="text-align:right">
                <div class="status-pill ${statusClass(o.status)}">${o.status === 'pending' ? 'Pending' : (o.status === 'complete' ? 'Complete' : o.status)}</div>
                <div class="small" style="margin-top:6px;font-weight:700">${formatMoney(o.total)}</div>
              </div>
            </div>
            <div class="order-items" aria-hidden="false"></div>
            <div class="actions">
              <button class="btn ghost" data-action="view">View details</button>
              <button class="btn primary" data-action="reorder">Reorder</button>
            </div>
          `;
                    const itemsWrap = el.querySelector('.order-items');
                    o.items.forEach(it => {
                        const row = document.createElement('div');
                        row.className = 'item-row';
                        row.innerHTML = `<div><div class="item-label">${escapeHtml(it.title)}</div><div class="small">${it.days} days</div></div><div style="font-weight:700">${formatMoney(it.price)}</div>`;
                        itemsWrap.appendChild(row);
                    });

                    el.querySelector('[data-action="view"]').addEventListener('click', () => {
                        // navigate to order details (demo)
                        window.location.href = `order-details.html?id=${encodeURIComponent(o.id)}`;
                    });
                    el.querySelector('[data-action="reorder"]').addEventListener('click', () => {
                        alert('Reorder demo: backend should create a new reservation from order ID ' + o.id);
                    });

                    ordersWrap.appendChild(el);
                });
            }

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.setAttribute('aria-selected', 'false'));
                    tab.setAttribute('aria-selected', 'true');
                    const filter = tab.dataset.filter;
                    renderOrders(filter);
                });
                tab.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        tab.click();
                    }
                });
            });

            // Back button: uses history.back(), fallback to index.html
            const backBtn = document.getElementById('backBtn');
            backBtn.addEventListener('click', () => {
                if (history.length > 1) history.back();
                else window.location.href = 'index.html';
            });

            // initial render
            renderOrders('all');

            function escapeHtml(s) {
                return String(s).replace(/[&<>"]/g, (c) => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;'
                }[c]));
            }
        })();
    </script>
</body>

</html>
