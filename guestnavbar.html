<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OzYde — Guest Navbar</title>
    <style>
         :root {
            --bg: #ffffff;
            --nav-bg: #0b0b0b;
            --muted: #9a9a9a;
            --accent: #111;
            --glass: rgba(255, 255, 255, 0.04);
            --max-width: 1200px;
        }
        
        * {
            box-sizing: border-box
        }
        
        html,
        body {
            height: 100%;
            margin: 0;
            font-family: Inter, system-ui, Segoe UI, Roboto, "Helvetica Neue", Arial;
            background: var(--bg);
            color: #111
        }
        /* NAVBAR */
        
        .nav-wrap {
            background: var(--nav-bg);
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 120;
            box-shadow: 0 6px 20px rgba(2, 2, 2, 0.12);
        }
        
        .nav {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 18px;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            gap: 12px;
            align-items: center;
            font-weight: 800;
            letter-spacing: 1px;
            font-size: 20px;
        }
        
        .logo-badge {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, #fff2, #fff6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #111;
            font-weight: 900;
            font-size: 16px;
            box-shadow: inset 0 -6px 14px rgba(0, 0, 0, 0.08);
        }
        /* Search */
        
        .search {
            flex: 1;
            max-width: 640px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 0 12px;
        }
        
        .search input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 999px 0 0 999px;
            border: 0;
            outline: 0;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }
        
        .search button {
            padding: 10px 12px;
            border-radius: 0 999px 999px 0;
            border: 0;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .search button svg {
            width: 16px;
            height: 16px
        }
        /* icons */
        
        .icons {
            display: flex;
            gap: 14px;
            align-items: center;
        }
        
        .icon-btn {
            background: transparent;
            border: 0;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        
        .icon-only {
            display: inline-flex;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 0;
            color: #fff;
            cursor: pointer;
        }
        
        .badge {
            background: #e23a57;
            color: #fff;
            border-radius: 10px;
            padding: 2px 6px;
            font-size: 12px;
            margin-left: 6px;
        }
        /* mobile */
        
        .mobile-toggle {
            display: none;
            background: transparent;
            border: 0;
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 8px
        }
        
        .mobile-menu {
            display: none;
            background: var(--nav-bg);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding: 12px;
        }
        
        .mobile-row {
            display: flex;
            gap: 10px;
            align-items: center
        }
        /* modal */
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal {
            width: 100%;
            max-width: 420px;
            background: #fff;
            color: #111;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .modal h3 {
            margin: 0 0 8px 0
        }
        
        .modal p {
            margin: 0 0 14px 0;
            color: var(--muted)
        }
        
        .modal .actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 12px
        }
        
        .btn {
            padding: 10px 14px;
            border-radius: 8px;
            border: 0;
            cursor: pointer;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
        }
        
        .btn.ghost {
            background: #fff;
            color: var(--accent);
            border: 1px solid rgba(0, 0, 0, 0.06)
        }
        /* small screens */
        
        @media (max-width:880px) {
            .search {
                display: none
            }
            .mobile-toggle {
                display: inline-flex;
                align-items: center;
                justify-content: center
            }
            .icons .profile-text {
                display: none
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR (GUEST) -->
    <header class="nav-wrap" role="banner">
        <div class="nav" role="navigation" aria-label="Main navigation">
            <div style="display:flex;align-items:center;gap:12px">
                <div class="logo">
                    <div class="logo-badge" aria-hidden="true">OZ</div>
                    <div>OZYDE</div>
                </div>
            </div>

            <div class="search" role="search" aria-label="Site search">
                <input id="searchInput" type="search" placeholder="Search dresses, styles, collection..." aria-label="Search">
                <button id="searchBtn" aria-label="Search">
          <!-- search icon -->
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 21l-4.35-4.35" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="11" cy="11" r="6" stroke="#111" stroke-width="2"/></svg>
        </button>
            </div>

            <div class="icons" role="group" aria-label="User actions">
                <button class="icon-only" title="Wishlist" aria-label="Wishlist" id="btnWishlist">
          <!-- heart -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20.8 7.2a5 5 0 0 0-7.07 0L12 8.94l-1.73-1.72a5 5 0 1 0-7.07 7.07L12 21.5l8.8-8.8a5 5 0 0 0 0-7.5z" stroke="white" stroke-width="1.2" fill="none"/></svg>
        </button>

                <button class="icon-only" title="Cart" aria-label="Cart" id="btnCart">
          <!-- cart -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 3h2l1 7h13" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="10" cy="20" r="1.5" fill="white"/><circle cx="18" cy="20" r="1.5" fill="white"/></svg>
        </button>

                <div style="display:flex;align-items:center;">
                    <button class="icon-btn profile-link" id="profileBtn" aria-haspopup="false" aria-label="Account - sign in">
            <!-- user icon -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="flex:0 0 18px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="7" r="4" stroke="white" stroke-width="1.4"/></svg>
            <span class="profile-text">Sign In</span>
          </button>
                </div>

                <!-- hamburger for mobile -->
                <button class="mobile-toggle" id="mobileToggle" aria-expanded="false" aria-label="Open menu">
          <!-- hamburger -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 7h18M3 12h18M3 17h18" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
            </div>
        </div>

        <!-- Mobile menu (search + icons) -->
        <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
            <div style="margin-bottom:10px">
                <input id="mobileSearch" type="search" placeholder="Search dresses, designers..." style="width:100%; padding:10px 12px; border-radius:8px; border:0; background:rgba(255,255,255,0.04); color:#fff">
            </div>
            <div class="mobile-row" style="gap:10px">
                <button class="icon-only" aria-label="Wishlist (mobile)" id="mobileWishlist">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20.8 7.2a5 5 0 0 0-7.07 0L12 8.94l-1.73-1.72a5 5 0 1 0-7.07 7.07L12 21.5l8.8-8.8a5 5 0 0 0 0-7.5z" stroke="white" stroke-width="1.2" fill="none"/></svg>
        </button>
                <button class="icon-only" aria-label="Cart (mobile)" id="mobileCart">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 3h2l1 7h13" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="10" cy="20" r="1.5" fill="white"/><circle cx="18" cy="20" r="1.5" fill="white"/></svg>
        </button>
                <button class="icon-btn" aria-label="Sign in (mobile)" id="mobileSignBtn">Sign In</button>
            </div>
        </div>
    </header>

    <!-- AUTH PROMPT MODAL -->
    <div class="modal-overlay" id="authModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="authTitle">
        <div class="modal" role="document">
            <h3 id="authTitle">Please Sign In</h3>
            <p id="authDesc">You need to be signed in to access this area (wishlist & cart). Sign in or create an account to continue.</p>

            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
                <button id="goSignIn" class="btn">Sign In</button>
                <button id="goSignUp" class="btn ghost">Create account</button>
                <button id="closeModal" class="btn ghost" style="margin-left:auto">Close</button>
            </div>
        </div>
    </div>

    <main style="padding:40px; max-width:var(--max-width); margin:0 auto">
        <h2 style="margin:0 0 12px 0">Page placeholder </h2>
        <p style="color:var(--muted)">This a demofor the guest navbar only.</p>
    </main>

    <script>
        // Elements
        const btnWishlist = document.getElementById('btnWishlist');
        const btnCart = document.getElementById('btnCart');
        const profileBtn = document.getElementById('profileBtn');
        const mobileWishlist = document.getElementById('mobileWishlist');
        const mobileCart = document.getElementById('mobileCart');
        const mobileSignBtn = document.getElementById('mobileSignBtn');
        const mobileToggle = document.getElementById('mobileToggle');
        const mobileMenu = document.getElementById('mobileMenu');
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');

        // Modal
        const authModal = document.getElementById('authModal');
        const goSignIn = document.getElementById('goSignIn');
        const goSignUp = document.getElementById('goSignUp');
        const closeModal = document.getElementById('closeModal');
        let lastFocused = null;

        function openAuthModal(triggerLabel) {
            // store last focused element to return focus
            lastFocused = document.activeElement;
            // update description slightly (optional)
            const desc = document.getElementById('authDesc');
            if (triggerLabel) desc.textContent = `You tried to access "${triggerLabel}". Please sign in or create an account to continue.`;
            // show modal
            authModal.style.display = 'flex';
            authModal.setAttribute('aria-hidden', 'false');
            // focus first action
            goSignIn.focus();
            // trap focus minimal: handle tab
            document.addEventListener('focus', focusTrap, true);
        }

        function closeAuthModal() {
            authModal.style.display = 'none';
            authModal.setAttribute('aria-hidden', 'true');
            document.removeEventListener('focus', focusTrap, true);
            if (lastFocused) lastFocused.focus();
        }

        function focusTrap(e) {
            // keep focus inside modal when visible
            if (authModal.style.display !== 'flex') return;
            if (!authModal.contains(e.target)) {
                e.stopPropagation();
                goSignIn.focus();
            }
        }

        // open modal handlers for restricted actions
        function restrictedClick(label) {
            return function(ev) {
                ev.preventDefault();
                openAuthModal(label);
            };
        }
        if (btnWishlist) btnWishlist.addEventListener('click', restrictedClick('Wishlist'));
        if (btnCart) btnCart.addEventListener('click', restrictedClick('Cart'));
        if (profileBtn) profileBtn.addEventListener('click', restrictedClick('Sign In'));
        if (mobileWishlist) mobileWishlist.addEventListener('click', restrictedClick('Wishlist'));
        if (mobileCart) mobileCart.addEventListener('click', restrictedClick('Cart'));
        if (mobileSignBtn) mobileSignBtn.addEventListener('click', restrictedClick('Sign In'));

        // modal action buttons - for demo they redirect to # or could be replaced with real routes
        goSignIn.addEventListener('click', () => {
            // demo: redirect to sign-in page route
            window.location.href = '/signin.html'; // replace with your real sign-in route
        });
        goSignUp.addEventListener('click', () => {
            window.location.href = '/signup.html'; // replace with your real sign-up route
        });
        closeModal.addEventListener('click', closeAuthModal);

        // close modal when clicking overlay outside the dialog
        authModal.addEventListener('click', (e) => {
            if (e.target === authModal) closeAuthModal();
        });

        // close modal on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && authModal.style.display === 'flex') closeAuthModal();
        });

        // mobile menu toggle
        mobileToggle && mobileToggle.addEventListener('click', () => {
            const open = mobileMenu.style.display === 'block';
            mobileMenu.style.display = open ? 'none' : 'block';
            mobileToggle.setAttribute('aria-expanded', String(!open));
            mobileMenu.setAttribute('aria-hidden', String(open));
        });

        // basic search wiring (demo)
        searchBtn && searchBtn.addEventListener('click', () => {
            const q = searchInput.value.trim();
            if (!q) {
                alert('Type something to search (demo)');
                return;
            }
            alert('Search (demo): ' + q);
        });
    </script>
</body>

</html>
